# Render 一键部署：会生成固定网址 https://xxx.onrender.com
# 在 https://render.com 连接 GitHub 仓库后，在 Dashboard 用此 Blueprint 或手动建 Web Service
# 根目录设为 backend（若仓库为整项目）
#
# 上传文件（模特图/SKU）：须与 disk.mountPath 一致设置 UPLOADS_ROOT，否则重启后易 404。
# 持久盘需付费实例（下方 plan: starter）；若改回免费实例请删除 disk、UPLOADS_ROOT 两项。
services:
  - type: web
    name: influencer-app-backend
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    disk:
      name: uploads-disk
      mountPath: /var/render/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # 必须与上方 disk.mountPath 完全相同
      - key: UPLOADS_ROOT
        value: /var/render/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: influencer-app-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # 可选：翻译/朗读（若使用）
      - key: DEEPSEEK_API_KEY
        sync: false

databases:
  - name: influencer-app-db
    region: singapore
