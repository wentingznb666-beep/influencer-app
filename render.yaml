# Render Blueprint — 在 https://dashboard.render.com 点击 "Blueprints" → "New Blueprint Instance" 连接此仓库
# 服务根目录 backend，构建产物包含前端静态文件
services:
  - type: web
    name: influencer-app-backend
    runtime: node
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: npm ci --include=dev && npm --prefix ../frontend ci --include=dev && npm --prefix ../frontend run build && npm run build
    startCommand: npm run start:server
    disk:
      name: uploads-disk
      mountPath: /var/render/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOADS_ROOT
        value: /var/render/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: influencer-app-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false

databases:
  - name: influencer-app-db
    region: singapore
