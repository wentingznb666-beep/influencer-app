<div class="page" id="tasks">
  <!-- 页面标题 -->
  <div class="section-header" style="margin-bottom:16px;">
    <span class="section-title">📋 任务大厅</span>
    <span class="text-sm text-muted">浏览和领取任务</span>
  </div>

  <!-- 任务列表 -->
  <div id="tasks-list">
    <div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-text">暂无可用任务</div>
      <div class="empty-sub">稍后再来看看吧</div>
    </div>
  </div>
</div>

<script>
  async function loadTasks() {
    try {
      const tasks = await api.getTasks();
      const listEl = document.getElementById('tasks-list');
      
      if (!Array.isArray(tasks) || tasks.length === 0) {
        listEl.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📭</div>
            <div class="empty-text">暂无可用任务</div>
            <div class="empty-sub">稍后再来看看吧</div>
          </div>`;
        return;
      }

      listEl.innerHTML = '<div class="list">' + tasks.map(task => `
        <div class="list-item">
          <div class="list-item-icon" style="background:#eff6ff;">🎬</div>
          <div class="list-item-content">
            <div class="list-item-title">${task.material_title || task.title || '未命名任务'}</div>
            <div class="list-item-desc">${task.platform || 'TikTok'} · ${task.type === 'face' ? '露脸' : '解说'}</div>
          </div>
          <div class="list-item-right">
            <div class="list-item-value">+${task.point_reward || 0}</div>
            <div class="list-item-meta">积分</div>
          </div>
        </div>
      `).join('') + '</div>';
    } catch (error) {
      console.error('加载任务失败:', error);
    }
  }

  loadTasks();
</script>
