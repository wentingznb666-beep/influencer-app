<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录 - 湘泰出海</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #00B900 0%, #009900 100%);
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo img {
      width: 80px;
      height: 80px;
      border-radius: 16px;
    }
    .login-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #333;
    }
    .login-subtitle {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .login-btn-line {
      background-color: #00B900;
      color: #fff;
    }
    .login-btn-line:hover {
      background-color: #009900;
    }
    .login-btn-line svg {
      width: 24px;
      height: 24px;
    }
    .login-divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #999;
      font-size: 14px;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }
    .login-divider span {
      padding: 0 16px;
    }
    .login-form .form-group {
      margin-bottom: 20px;
    }
    .login-form .form-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    .login-form .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    .login-form .form-input:focus {
      border-color: #00B900;
      outline: none;
    }
    .login-form .btn-primary {
      width: 100%;
      padding: 14px;
      background-color: #152a45;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-form .btn-primary:hover {
      background-color: #1e3a5c;
    }
    .login-error {
      color: #f5222d;
      font-size: 14px;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #152a45 0%, #1e3a5c 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center;">
          <span style="color: #fff; font-size: 32px; font-weight: 700;">XT</span>
        </div>
      </div>
      
      <h1 class="login-title">湘泰出海</h1>
      <p class="login-subtitle">达人分发平台</p>

      <!-- LINE 登录按钮 -->
      <button id="line-login-btn" class="login-btn login-btn-line">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </svg>
        使用 LINE 登录
      </button>

      <div class="login-divider">
        <span>或</span>
      </div>

      <!-- 账号密码登录 -->
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label class="form-label">账号</label>
          <input type="text" id="username" class="form-input" placeholder="请输入账号" required>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn-primary">登录</button>
      </form>

      <div id="error-msg" class="login-error" style="display: none;"></div>
    </div>
  </div>

  <script>
    // 初始化 LIFF
    async function initLiff() {
      try {
        await liff.init({ liffId: '2010170295-TZkdNwDc' });
        console.log('LIFF 初始化成功');
        
        // 检查是否已登录
        if (liff.isLoggedIn()) {
          await handleLineLogin();
        }
      } catch (error) {
        console.error('LIFF 初始化失败:', error);
      }
    }

    // LINE 登录
    document.getElementById('line-login-btn').addEventListener('click', async () => {
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        await handleLineLogin();
      }
    });

    // 处理 LINE 登录
    async function handleLineLogin() {
      try {
        const accessToken = liff.getAccessToken();
        
        const response = await fetch('https://xiangtaiyyj.site/api/auth/line-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accessToken }),
        });

        const data = await response.json();

        if (response.ok) {
          // 保存登录信息
          localStorage.setItem('liff_access_token', data.accessToken);
          localStorage.setItem('liff_user', JSON.stringify(data.user));
          
          // 跳转到首页
          window.location.href = '/liff-app/';
        } else {
          showError(data.message || 'LINE 登录失败');
        }
      } catch (error) {
        console.error('LINE 登录失败:', error);
        showError('LINE 登录失败，请重试');
      }
    }

    // 账号密码登录
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('https://xiangtaiyyj.site/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (response.ok) {
          // 保存登录信息
          localStorage.setItem('liff_access_token', data.accessToken);
          localStorage.setItem('liff_user', JSON.stringify(data.user));
          
          // 跳转到首页
          window.location.href = '/liff-app/';
        } else {
          showError(data.message || '登录失败');
        }
      } catch (error) {
        console.error('登录失败:', error);
        showError('登录失败，请重试');
      }
    });

    // 显示错误信息
    function showError(message) {
      const errorMsg = document.getElementById('error-msg');
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
      
      setTimeout(() => {
        errorMsg.style.display = 'none';
      }, 3000);
    }

    // 初始化
    initLiff();
  </script>
</body>
</html>
