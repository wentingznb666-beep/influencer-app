<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>登录 - 湘泰出海</title>
  <link rel="stylesheet" href="/liff/css/style.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      background: linear-gradient(180deg, #06C755 0%, #05a648 40%, var(--bg) 40%);
      min-height: 100vh;
      min-height: 100dvh;
    }
    .login-container {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
      padding-top: calc(60px + env(safe-area-inset-top, 0px));
    }
    .login-brand {
      text-align: center;
      margin-bottom: 40px;
      color: #fff;
    }
    .login-brand-logo {
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      backdrop-filter: blur(10px);
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }
    .login-brand-name {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .login-brand-desc {
      font-size: 14px;
      opacity: 0.85;
    }
    .login-card {
      background: var(--card);
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .login-card-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 28px;
      color: var(--text);
    }
    .login-btn-line {
      width: 100%;
      padding: 16px;
      background: #06C755;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(6, 199, 85, 0.3);
    }
    .login-btn-line:active {
      transform: scale(0.97);
      background: #05a648;
    }
    .login-btn-line svg {
      width: 22px;
      height: 22px;
    }
    .login-divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .login-divider span {
      padding: 0 16px;
    }
    .login-form .form-group {
      margin-bottom: 16px;
    }
    .login-form .form-label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    .login-form .form-input {
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 15px;
      background: var(--bg);
      border: 1.5px solid transparent;
    }
    .login-form .form-input:focus {
      background: var(--card);
      border-color: var(--primary);
    }
    .login-form .btn-primary {
      margin-top: 8px;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
    }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      padding: 10px;
      background: #fef2f2;
      border-radius: 8px;
      display: none;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      padding-bottom: calc(24px + var(--safe-bottom));
    }
    .login-footer-text {
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-brand">
      <div class="login-brand-logo">XT</div>
      <div class="login-brand-name">湘泰出海</div>
      <div class="login-brand-desc">达人分发平台</div>
    </div>

    <div class="login-card">
      <div class="login-card-title">欢迎回来</div>

      <!-- LINE 登录按钮 -->
      <button id="line-login-btn" class="login-btn-line">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
        </svg>
        使用 LINE 登录
      </button>

      <div class="login-divider">
        <span>或使用账号密码</span>
      </div>

      <!-- 账号密码登录 -->
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label class="form-label">账号</label>
          <input type="text" id="username" class="form-input" placeholder="请输入账号" required>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>

      <div id="error-msg" class="login-error"></div>
    </div>

    <div class="login-footer">
      <div class="login-footer-text">湘泰国际 · 达人分发平台</div>
    </div>
  </div>

  <script>
    // 初始化 LIFF
    async function initLiff() {
      try {
        await liff.init({ liffId: '2010170295-TZkdNwDc' });
        console.log('LIFF 初始化成功');
        
        // 检查是否已登录
        if (liff.isLoggedIn()) {
          await handleLineLogin();
        }
      } catch (error) {
        console.error('LIFF 初始化失败:', error);
      }
    }

    // LINE 登录
    document.getElementById('line-login-btn').addEventListener('click', async () => {
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        await handleLineLogin();
      }
    });

    // 处理 LINE 登录
    async function handleLineLogin() {
      try {
        const accessToken = liff.getAccessToken();
        
        const response = await fetch('https://xiangtaiyyj.site/api/auth/line-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accessToken }),
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('liff_access_token', data.accessToken);
          localStorage.setItem('liff_user', JSON.stringify(data.user));
          window.location.href = '/liff/';
        } else {
          showError(data.message || 'LINE 登录失败');
        }
      } catch (error) {
        console.error('LINE 登录失败:', error);
        showError('LINE 登录失败，请重试');
      }
    }

    // 账号密码登录
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('https://xiangtaiyyj.site/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('liff_access_token', data.accessToken);
          localStorage.setItem('liff_user', JSON.stringify(data.user));
          window.location.href = '/liff/';
        } else {
          showError(data.message || '登录失败');
        }
      } catch (error) {
        console.error('登录失败:', error);
        showError('登录失败，请重试');
      }
    });

    // 显示错误信息
    function showError(message) {
      const errorMsg = document.getElementById('error-msg');
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
      
      setTimeout(() => {
        errorMsg.style.display = 'none';
      }, 3000);
    }

    // 初始化
    initLiff();
  </script>
</body>
</html>
