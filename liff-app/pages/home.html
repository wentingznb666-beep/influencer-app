<div class="page" id="home">
  <!-- 用户信息卡片 -->
  <div class="user-card">
    <div class="user-card-header">
      <img id="user-avatar" class="avatar" src="" alt="头像">
      <div class="user-card-info">
        <div id="user-name" class="user-card-name"></div>
        <div id="user-role" class="user-card-role"></div>
      </div>
    </div>
    <div class="user-card-stats">
      <div class="stat-item">
        <div id="user-points" class="stat-value">0</div>
        <div class="stat-label">积分</div>
      </div>
      <div class="stat-item">
        <div id="user-tasks" class="stat-value">0</div>
        <div class="stat-label">任务</div>
      </div>
      <div class="stat-item">
        <div id="user-orders" class="stat-value">0</div>
        <div class="stat-label">商单</div>
      </div>
    </div>
  </div>

  <!-- 快捷入口 -->
  <div class="quick-actions">
    <a href="javascript:void(0)" class="quick-action" onclick="app.loadPage('tasks')">
      <div class="quick-action-icon">📋</div>
      <span class="quick-action-text">任务大厅</span>
    </a>
    <a href="javascript:void(0)" class="quick-action" onclick="app.loadPage('orders')">
      <div class="quick-action-icon">💰</div>
      <span class="quick-action-text">商单中心</span>
    </a>
    <a href="javascript:void(0)" class="quick-action" onclick="app.loadPage('my-tasks')">
      <div class="quick-action-icon">✅</div>
      <span class="quick-action-text">我的任务</span>
    </a>
    <a href="javascript:void(0)" class="quick-action" onclick="app.loadPage('points')">
      <div class="quick-action-icon">⭐</div>
      <span class="quick-action-text">积分提现</span>
    </a>
  </div>

  <!-- 最新任务 -->
  <div class="section-header">
    <span class="section-title">📋 最新任务</span>
    <a href="javascript:void(0)" class="section-link" onclick="app.loadPage('tasks')">查看全部</a>
  </div>
  <div id="home-tasks-list" class="list">
    <div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-text">暂无任务</div>
    </div>
  </div>
</div>

<script>
  // 加载首页数据
  async function loadHomeData() {
    try {
      const user = auth.getCurrentUser();
      if (user) {
        const avatarEl = document.getElementById('user-avatar');
        const nameEl = document.getElementById('user-name');
        const roleEl = document.getElementById('user-role');
        
        avatarEl.src = user.linePictureUrl || user.avatar_url || '';
        avatarEl.onerror = function() { this.style.display = 'none'; };
        nameEl.textContent = user.displayName || user.display_name || user.username || '用户';
        
        const roleMap = { 'admin': '管理员', 'influencer': '达人', 'client': '商家', 'employee': '员工' };
        roleEl.textContent = roleMap[user.role] || '达人';
      }

      // 加载积分
      try {
        const points = await api.getPoints();
        if (points) {
          document.getElementById('user-points').textContent = points.balance || 0;
        }
      } catch (e) {}

      // 加载任务数
      try {
        const claims = await api.getMyClaims();
        if (Array.isArray(claims)) {
          document.getElementById('user-tasks').textContent = claims.length;
        }
      } catch (e) {}

      // 加载商单数
      try {
        const orders = await api.getMyMarketOrders();
        if (Array.isArray(orders)) {
          document.getElementById('user-orders').textContent = orders.length;
        }
      } catch (e) {}

      // 加载最新任务
      try {
        const tasks = await api.getTasks();
        const listEl = document.getElementById('home-tasks-list');
        if (Array.isArray(tasks) && tasks.length > 0) {
          listEl.innerHTML = tasks.slice(0, 3).map(task => `
            <div class="list-item">
              <div class="list-item-icon" style="background: #eff6ff;">🎬</div>
              <div class="list-item-content">
                <div class="list-item-title">${task.material_title || task.title || '未命名任务'}</div>
                <div class="list-item-desc">${task.platform || 'TikTok'} · ${task.type === 'face' ? '露脸' : '解说'}</div>
              </div>
              <div class="list-item-right">
                <div class="list-item-value">+${task.point_reward || 0}</div>
                <div class="list-item-meta">积分</div>
              </div>
            </div>
          `).join('');
        }
      } catch (e) {}

    } catch (error) {
      console.error('加载首页数据失败:', error);
    }
  }

  loadHomeData();
</script>
