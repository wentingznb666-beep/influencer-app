<div class="page" id="profile">
  <!-- 页面标题 -->
  <div class="card">
    <div class="card-title">个人资料</div>
    <p style="font-size: 14px; color: #666;">查看和编辑个人信息</p>
  </div>

  <!-- 用户信息 -->
  <div class="card">
    <div style="display: flex; align-items: center; margin-bottom: 20px;">
      <img id="profile-avatar" class="avatar" src="" alt="头像" style="width: 64px; height: 64px;">
      <div style="margin-left: 16px;">
        <div id="profile-name" style="font-size: 20px; font-weight: 600;"></div>
        <div id="profile-role" style="font-size: 14px; color: #666; margin-top: 4px;"></div>
      </div>
    </div>
  </div>

  <!-- 功能菜单 -->
  <div class="card">
    <div class="list">
      <a href="pages/my-tasks.html" class="list-item" style="text-decoration: none; color: inherit;">
        <div style="margin-right: 12px; font-size: 24px;">📋</div>
        <div class="list-item-content">
          <div class="list-item-title">我的任务</div>
          <div class="list-item-desc">查看已领取的任务</div>
        </div>
        <div style="color: #999;">›</div>
      </a>
      <a href="pages/my-orders.html" class="list-item" style="text-decoration: none; color: inherit;">
        <div style="margin-right: 12px; font-size: 24px;">💰</div>
        <div class="list-item-content">
          <div class="list-item-title">我的商单</div>
          <div class="list-item-desc">查看已领取的商单</div>
        </div>
        <div style="color: #999;">›</div>
      </a>
      <a href="pages/points.html" class="list-item" style="text-decoration: none; color: inherit;">
        <div style="margin-right: 12px; font-size: 24px;">⭐</div>
        <div class="list-item-content">
          <div class="list-item-title">积分中心</div>
          <div class="list-item-desc">查看积分和提现</div>
        </div>
        <div style="color: #999;">›</div>
      </a>
    </div>
  </div>

  <!-- 其他功能 -->
  <div class="card">
    <div class="list">
      <div class="list-item" onclick="showAbout()" style="cursor: pointer;">
        <div style="margin-right: 12px; font-size: 24px;">ℹ️</div>
        <div class="list-item-content">
          <div class="list-item-title">关于我们</div>
          <div class="list-item-desc">了解湘泰出海</div>
        </div>
        <div style="color: #999;">›</div>
      </div>
      <div class="list-item" onclick="showHelp()" style="cursor: pointer;">
        <div style="margin-right: 12px; font-size: 24px;">❓</div>
        <div class="list-item-content">
          <div class="list-item-title">帮助中心</div>
          <div class="list-item-desc">常见问题解答</div>
        </div>
        <div style="color: #999;">›</div>
      </div>
      <div class="list-item" onclick="contactService()" style="cursor: pointer;">
        <div style="margin-right: 12px; font-size: 24px;">📞</div>
        <div class="list-item-content">
          <div class="list-item-title">联系客服</div>
          <div class="list-item-desc">在线客服支持</div>
        </div>
        <div style="color: #999;">›</div>
      </div>
    </div>
  </div>

  <!-- 退出登录 -->
  <div class="card">
    <button onclick="logout()" class="btn btn-secondary" style="width: 100%; color: #f5222d;">
      退出登录
    </button>
  </div>

  <!-- 版本信息 -->
  <div style="text-align: center; padding: 20px; color: #999; font-size: 12px;">
    湘泰出海达人分发 v1.0.0
  </div>
</div>

<script>
  // 加载用户信息
  async function loadUserInfo() {
    try {
      const user = JSON.parse(localStorage.getItem('liff_user'));
      if (user) {
        document.getElementById('profile-name').textContent = user.lineDisplayName || user.username || '用户';
        document.getElementById('profile-role').textContent = getRoleName(user.role);
        document.getElementById('profile-avatar').src = user.linePictureUrl || '/liff-app/assets/images/default-avatar.png';
      }
    } catch (error) {
      console.error('获取用户信息失败:', error);
    }
  }

  // 获取角色名称
  function getRoleName(role) {
    const roleNames = {
      admin: '管理员',
      employee: '员工',
      client: '客户',
      influencer: '达人',
    };
    return roleNames[role] || '用户';
  }

  // 显示关于
  function showAbout() {
    utils.showToast('湘泰出海达人分发平台', 'info');
  }

  // 显示帮助
  function showHelp() {
    utils.showToast('帮助中心开发中...', 'info');
  }

  // 联系客服
  function contactService() {
    // 打开 LINE 聊天
    if (typeof liff !== 'undefined' && liff.isApiAvailable('openChatWindow')) {
      liff.openChatWindow({ url: 'https://line.me/ti/p/@xiangtai' });
    } else {
      utils.showToast('客服功能开发中...', 'info');
    }
  }

  // 退出登录
  function logout() {
    if (confirm('确定要退出登录吗？')) {
      localStorage.removeItem('liff_access_token');
      localStorage.removeItem('liff_user');
      
      if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
        liff.logout();
      }
      
      window.location.href = '/liff-app/pages/login.html';
    }
  }

  // 加载用户信息
  loadUserInfo();
</script>
