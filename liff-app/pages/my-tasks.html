<div class="page" id="my-tasks">
  <div class="section-header" style="margin-bottom:16px;">
    <span class="section-title">✅ 我的任务</span>
  </div>

  <div id="my-tasks-list">
    <div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">暂无任务</div>
      <div class="empty-sub">去任务大厅领取任务吧</div>
    </div>
  </div>
</div>

<script>
  async function loadMyTasks() {
    try {
      const claims = await api.getMyClaims();
      const listEl = document.getElementById('my-tasks-list');
      
      if (!Array.isArray(claims) || claims.length === 0) {
        listEl.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">暂无任务</div><div class="empty-sub">去任务大厅领取任务吧</div></div>';
        return;
      }

      const statusMap = {
        'pending': { text: '待提交', tag: 'tag-warning' },
        'submitted': { text: '已提交', tag: 'tag-info' },
        'approved': { text: '已通过', tag: 'tag-success' },
        'rejected': { text: '已拒绝', tag: 'tag-error' },
      };

      listEl.innerHTML = '<div class="list">' + claims.map(claim => {
        const st = statusMap[claim.status] || { text: claim.status, tag: '' };
        return `
          <div class="list-item">
            <div class="list-item-icon" style="background:#eff6ff;">🎬</div>
            <div class="list-item-content">
              <div class="list-item-title">${claim.material_title || claim.title || '任务'}</div>
              <div class="list-item-desc">${claim.platform || 'TikTok'}</div>
            </div>
            <div class="list-item-right">
              <span class="tag ${st.tag}">${st.text}</span>
            </div>
          </div>`;
      }).join('') + '</div>';
    } catch (error) {
      console.error('加载我的任务失败:', error);
    }
  }

  loadMyTasks();
</script>
