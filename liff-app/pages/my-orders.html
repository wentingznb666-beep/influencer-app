<div class="page" id="my-orders">
  <div class="section-header" style="margin-bottom:16px;">
    <span class="section-title">💰 我的商单</span>
  </div>

  <div id="my-orders-list">
    <div class="empty">
      <div class="empty-icon">💰</div>
      <div class="empty-text">暂无商单</div>
      <div class="empty-sub">去商单中心领取吧</div>
    </div>
  </div>
</div>

<script>
  async function loadMyOrders() {
    try {
      const orders = await api.getMyMarketOrders();
      const listEl = document.getElementById('my-orders-list');
      
      if (!Array.isArray(orders) || orders.length === 0) {
        listEl.innerHTML = '<div class="empty"><div class="empty-icon">💰</div><div class="empty-text">暂无商单</div><div class="empty-sub">去商单中心领取吧</div></div>';
        return;
      }

      const statusMap = {
        'open': { text: '进行中', tag: 'tag-info' },
        'claimed': { text: '已领取', tag: 'tag-warning' },
        'completed': { text: '已完成', tag: 'tag-success' },
        'cancelled': { text: '已取消', tag: 'tag-error' },
      };

      listEl.innerHTML = '<div class="list">' + orders.map(order => {
        const st = statusMap[order.status] || { text: order.status, tag: '' };
        return `
          <div class="list-item">
            <div class="list-item-icon" style="background:#fef3c7;">💎</div>
            <div class="list-item-content">
              <div class="list-item-title">${order.title || '未命名商单'}</div>
              <div class="list-item-desc">${order.tier || 'C'}级</div>
            </div>
            <div class="list-item-right">
              <span class="tag ${st.tag}">${st.text}</span>
              <div class="list-item-meta mt-8">+${order.reward_points || 0} 积分</div>
            </div>
          </div>`;
      }).join('') + '</div>';
    } catch (error) {
      console.error('加载我的商单失败:', error);
    }
  }

  loadMyOrders();
</script>
