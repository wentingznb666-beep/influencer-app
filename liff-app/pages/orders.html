<div class="page" id="orders">
  <div class="section-header" style="margin-bottom:16px;">
    <span class="section-title">💰 商单中心</span>
    <span class="text-sm text-muted">浏览和领取商单</span>
  </div>

  <div id="orders-list">
    <div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-text">暂无可用商单</div>
    </div>
  </div>
</div>

<script>
  async function loadOrders() {
    try {
      const orders = await api.getMarketOrders();
      const listEl = document.getElementById('orders-list');
      
      if (!Array.isArray(orders) || orders.length === 0) {
        listEl.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">暂无可用商单</div></div>';
        return;
      }

      listEl.innerHTML = '<div class="list">' + orders.map(order => `
        <div class="list-item">
          <div class="list-item-icon" style="background:#fef3c7;">💎</div>
          <div class="list-item-content">
            <div class="list-item-title">${order.title || '未命名商单'}</div>
            <div class="list-item-desc">${order.tier || 'C'}级 · ${order.status === 'open' ? '可领取' : order.status}</div>
          </div>
          <div class="list-item-right">
            <div class="list-item-value">+${order.reward_points || 0}</div>
            <div class="list-item-meta">积分</div>
          </div>
        </div>
      `).join('') + '</div>';
    } catch (error) {
      console.error('加载商单失败:', error);
    }
  }

  loadOrders();
</script>
