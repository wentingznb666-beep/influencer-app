<div class="page" id="points">
  <!-- 页面标题 -->
  <div class="card">
    <div class="card-title">积分中心</div>
    <p style="font-size: 14px; color: #666;">查看积分余额和提现记录</p>
  </div>

  <!-- 积分信息 -->
  <div class="card">
    <div style="text-align: center; padding: 20px 0;">
      <div style="font-size: 14px; color: #666; margin-bottom: 8px;">积分余额</div>
      <div id="points-balance" style="font-size: 48px; font-weight: 700; color: #00B900;">0</div>
      <div style="margin-top: 16px;">
        <button onclick="showWithdrawModal()" class="btn btn-primary" style="padding: 12px 32px;">
          申请提现
        </button>
      </div>
    </div>
  </div>

  <!-- 积分明细 -->
  <div class="card">
    <div class="card-title">积分明细</div>
    <div id="points-history" class="list">
      <div class="empty">
        <div class="empty-icon">⭐</div>
        <div class="empty-text">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 提现记录 -->
  <div class="card">
    <div class="card-title">提现记录</div>
    <div id="withdrawals-list" class="list">
      <div class="empty">
        <div class="empty-icon">💰</div>
        <div class="empty-text">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 提现弹窗 -->
  <div id="withdraw-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center;">
    <div style="background: #fff; border-radius: 16px; padding: 24px; width: 90%; max-width: 360px;">
      <div style="font-size: 18px; font-weight: 600; margin-bottom: 16px; text-align: center;">申请提现</div>
      <form id="withdraw-form">
        <div class="form-group">
          <label class="form-label">提现积分</label>
          <input type="number" id="withdraw-points" class="form-input" placeholder="请输入提现积分" min="100" required>
          <div style="font-size: 12px; color: #999; margin-top: 4px;">最低提现 100 积分</div>
        </div>
        <div class="form-group">
          <label class="form-label">提现方式</label>
          <select id="withdraw-method" class="form-input">
            <option value="bank">银行卡</option>
            <option value="alipay">支付宝</option>
            <option value="wechat">微信</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">账号信息</label>
          <input type="text" id="withdraw-account" class="form-input" placeholder="请输入账号信息" required>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 20px;">
          <button type="button" onclick="hideWithdrawModal()" class="btn btn-secondary" style="flex: 1;">取消</button>
          <button type="submit" class="btn btn-primary" style="flex: 1;">确认提现</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // 加载积分信息
  async function loadPoints() {
    try {
      const points = await api.getPoints();
      if (points) {
        document.getElementById('points-balance').textContent = utils.formatPoints(points.balance || 0);
      }
    } catch (error) {
      console.error('获取积分信息失败:', error);
    }
  }

  // 加载积分明细
  async function loadPointsHistory() {
    try {
      const points = await api.getPoints();
      const container = document.getElementById('points-history');

      if (!points || !points.history || points.history.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">⭐</div>
            <div class="empty-text">暂无积分明细</div>
          </div>
        `;
        return;
      }

      container.innerHTML = points.history.map(item => `
        <div class="list-item">
          <div class="list-item-content">
            <div class="list-item-title">${item.description || '积分变动'}</div>
            <div class="list-item-desc">${utils.formatDateTime(item.created_at)}</div>
            <div style="margin-top: 8px; font-size: 16px; font-weight: 700; color: ${item.amount > 0 ? '#00B900' : '#f5222d'};">
              ${item.amount > 0 ? '+' : ''}${utils.formatPoints(item.amount)}
            </div>
          </div>
        </div>
      `).join('');

    } catch (error) {
      console.error('获取积分明细失败:', error);
      document.getElementById('points-history').innerHTML = `
        <div class="empty">
          <div class="empty-icon">😢</div>
          <div class="empty-text">获取积分明细失败</div>
        </div>
      `;
    }
  }

  // 加载提现记录
  async function loadWithdrawals() {
    try {
      const withdrawals = await api.getWithdrawals();
      const container = document.getElementById('withdrawals-list');

      if (!withdrawals || withdrawals.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">💰</div>
            <div class="empty-text">暂无提现记录</div>
          </div>
        `;
        return;
      }

      container.innerHTML = withdrawals.map(item => `
        <div class="list-item">
          <div class="list-item-content">
            <div class="list-item-title">提现 ${utils.formatPoints(item.points)} 积分</div>
            <div class="list-item-desc">${utils.formatDateTime(item.created_at)}</div>
            <div style="margin-top: 8px;">
              <span class="tag ${getStatusTagClass(item.status)}">${getStatusLabel(item.status)}</span>
              <span style="margin-left: 8px; font-size: 14px; color: #666;">
                方式：${getMethodLabel(item.method)}
              </span>
            </div>
          </div>
        </div>
      `).join('');

    } catch (error) {
      console.error('获取提现记录失败:', error);
      document.getElementById('withdrawals-list').innerHTML = `
        <div class="empty">
          <div class="empty-icon">😢</div>
          <div class="empty-text">获取提现记录失败</div>
        </div>
      `;
    }
  }

  // 获取状态标签样式
  function getStatusTagClass(status) {
    const classes = {
      pending: 'tag-warning',
      approved: 'tag-success',
      rejected: 'tag-error',
      completed: 'tag-success',
    };
    return classes[status] || 'tag-warning';
  }

  // 获取状态标签文本
  function getStatusLabel(status) {
    const labels = {
      pending: '待审核',
      approved: '已通过',
      rejected: '已拒绝',
      completed: '已完成',
    };
    return labels[status] || '未知';
  }

  // 获取提现方式标签
  function getMethodLabel(method) {
    const labels = {
      bank: '银行卡',
      alipay: '支付宝',
      wechat: '微信',
    };
    return labels[method] || method;
  }

  // 显示提现弹窗
  function showWithdrawModal() {
    document.getElementById('withdraw-modal').style.display = 'flex';
  }

  // 隐藏提现弹窗
  function hideWithdrawModal() {
    document.getElementById('withdraw-modal').style.display = 'none';
  }

  // 提交提现申请
  document.getElementById('withdraw-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const points = document.getElementById('withdraw-points').value;
    const method = document.getElementById('withdraw-method').value;
    const account = document.getElementById('withdraw-account').value;

    if (!points || points < 100) {
      utils.showToast('最低提现 100 积分', 'warning');
      return;
    }

    if (!account) {
      utils.showToast('请输入账号信息', 'warning');
      return;
    }

    try {
      const result = await api.requestWithdrawal({
        points: parseInt(points),
        method,
        account,
      });

      utils.showToast('提现申请已提交', 'success');
      hideWithdrawModal();

      // 重新加载数据
      await loadPoints();
      await loadWithdrawals();
    } catch (error) {
      console.error('提现申请失败:', error);
      utils.showToast(error.message || '提现申请失败', 'error');
    }
  });

  // 加载数据
  loadPoints();
  loadPointsHistory();
  loadWithdrawals();
</script>
