<div class="page" id="points">
  <div class="section-header" style="margin-bottom:16px;">
    <span class="section-title">⭐ 积分中心</span>
  </div>

  <!-- 积分卡片 -->
  <div class="card" style="text-align:center; padding:32px 20px;">
    <div class="text-muted text-sm" style="margin-bottom:8px;">积分余额</div>
    <div id="points-balance" style="font-size:48px; font-weight:800; color:var(--primary); line-height:1.2;">0</div>
    <div class="mt-16">
      <button onclick="showWithdrawModal()" class="btn btn-primary">申请提现</button>
    </div>
  </div>

  <!-- 提现记录 -->
  <div class="section-header mt-24">
    <span class="section-title">📝 提现记录</span>
  </div>
  <div id="withdrawals-list">
    <div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">暂无提现记录</div>
    </div>
  </div>
</div>

<!-- 提现弹窗 -->
<div id="withdraw-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">申请提现</div>
    <form id="withdraw-form">
      <div class="form-group">
        <label class="form-label">提现金额（积分）</label>
        <input type="number" id="withdraw-amount" class="form-input" placeholder="请输入提现金额" min="1" required>
      </div>
      <div class="form-group">
        <label class="form-label">银行名称</label>
        <input type="text" id="withdraw-bank" class="form-input" placeholder="如：Bangkok Bank" required>
      </div>
      <div class="form-group">
        <label class="form-label">账户名</label>
        <input type="text" id="withdraw-name" class="form-input" placeholder="请输入账户名" required>
      </div>
      <div class="form-group">
        <label class="form-label">账号</label>
        <input type="text" id="withdraw-account" class="form-input" placeholder="请输入银行账号" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">提交申请</button>
      <button type="button" class="btn btn-secondary btn-block mt-8" onclick="hideWithdrawModal()">取消</button>
    </form>
  </div>
</div>

<script>
  async function loadPoints() {
    try {
      const points = await api.getPoints();
      if (points) {
        document.getElementById('points-balance').textContent = points.balance || 0;
      }
    } catch (e) {}

    try {
      const withdrawals = await api.getWithdrawals();
      const listEl = document.getElementById('withdrawals-list');
      if (Array.isArray(withdrawals) && withdrawals.length > 0) {
        listEl.innerHTML = '<div class="list">' + withdrawals.map(w => `
          <div class="list-item">
            <div class="list-item-icon" style="background:#fef3c7;">💸</div>
            <div class="list-item-content">
              <div class="list-item-title">${w.amount} 积分</div>
              <div class="list-item-desc">${w.bank_name || ''} ${w.bank_account_name || ''}</div>
            </div>
            <div class="list-item-right">
              <span class="tag ${w.status === 'paid' ? 'tag-success' : w.status === 'rejected' ? 'tag-error' : 'tag-warning'}">
                ${w.status === 'paid' ? '已打款' : w.status === 'rejected' ? '已拒绝' : '待处理'}
              </span>
            </div>
          </div>
        `).join('') + '</div>';
      }
    } catch (e) {}
  }

  function showWithdrawModal() {
    document.getElementById('withdraw-modal').style.display = 'flex';
  }

  function hideWithdrawModal() {
    document.getElementById('withdraw-modal').style.display = 'none';
  }

  document.getElementById('withdraw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api.requestWithdrawal({
        amount: parseInt(document.getElementById('withdraw-amount').value),
        bank_name: document.getElementById('withdraw-bank').value,
        bank_account_name: document.getElementById('withdraw-name').value,
        bank_account_no: document.getElementById('withdraw-account').value,
      });
      utils.showToast('提现申请已提交', 'success');
      hideWithdrawModal();
      loadPoints();
    } catch (error) {
      utils.showToast(error.message || '提现失败', 'error');
    }
  });

  document.getElementById('withdraw-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) hideWithdrawModal();
  });

  loadPoints();
</script>
