<div class="page" id="profile">
  <!-- 用户信息 -->
  <div class="card" style="text-align:center; padding:32px 20px;">
    <img id="profile-avatar" class="avatar avatar-lg" src="" alt="头像" style="margin:0 auto 12px;">
    <div id="profile-name" style="font-size:20px; font-weight:700;"></div>
    <div id="profile-role" class="text-muted mt-8"></div>
  </div>

  <!-- 功能菜单 -->
  <div class="list mt-16">
    <div class="list-item" onclick="app.loadPage('my-tasks')">
      <div class="list-item-icon" style="background:#eff6ff;">📋</div>
      <div class="list-item-content">
        <div class="list-item-title">我的任务</div>
        <div class="list-item-desc">查看已领取的任务</div>
      </div>
      <div class="list-item-right">
        <span style="color:var(--text-muted);">›</span>
      </div>
    </div>
    <div class="list-item" onclick="app.loadPage('my-orders')">
      <div class="list-item-icon" style="background:#fef3c7;">💰</div>
      <div class="list-item-content">
        <div class="list-item-title">我的商单</div>
        <div class="list-item-desc">查看已领取的商单</div>
      </div>
      <div class="list-item-right">
        <span style="color:var(--text-muted);">›</span>
      </div>
    </div>
    <div class="list-item" onclick="app.loadPage('points')">
      <div class="list-item-icon" style="background:#ecfdf5;">⭐</div>
      <div class="list-item-content">
        <div class="list-item-title">积分中心</div>
        <div class="list-item-desc">查看积分和提现</div>
      </div>
      <div class="list-item-right">
        <span style="color:var(--text-muted);">›</span>
      </div>
    </div>
  </div>

  <!-- 退出登录 -->
  <div class="mt-24" style="padding:0 4px;">
    <button onclick="auth.logout()" class="btn btn-secondary btn-block" style="color:var(--danger);">退出登录</button>
  </div>
</div>

<script>
  function loadProfile() {
    const user = auth.getCurrentUser();
    if (user) {
      const avatarEl = document.getElementById('profile-avatar');
      avatarEl.src = user.linePictureUrl || user.avatar_url || '';
      avatarEl.onerror = function() { this.style.display = 'none'; };
      
      document.getElementById('profile-name').textContent = user.displayName || user.display_name || user.username || '用户';
      
      const roleMap = { 'admin': '管理员', 'influencer': '达人', 'client': '商家', 'employee': '员工' };
      document.getElementById('profile-role').textContent = roleMap[user.role] || '达人';
    }
  }

  loadProfile();
</script>
