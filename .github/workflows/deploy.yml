name: Deploy to Tencent Cloud

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 119.28.143.135
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/ubuntu/influencer-app
          git fetch origin
          git reset --hard origin/master
          cd backend
          npm install
          npm run build
          pm2 restart influencer-app
          cd ../frontend
          npm install
          npx vite build --outDir dist-new
          sudo rm -rf dist
          sudo mv dist-new dist
          sudo chown -R www-data:www-data dist
          echo "✅ 部署完成"
